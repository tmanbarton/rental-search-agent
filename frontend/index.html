<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rental Search Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 680px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: #2563eb;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.45;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #e5e7eb;
      color: #1f2937;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: center;
      background: #fee2e2;
      color: #991b1b;
      font-size: 13px;
      max-width: 90%;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 10px 14px;
      background: #e5e7eb;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      display: none;
      gap: 4px;
    }

    .typing-indicator.visible { display: flex; }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }

    .chat-input-area {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .chat-input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
    }

    .chat-input-area textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .chat-input-area button {
      padding: 10px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      align-self: flex-end;
    }

    .chat-input-area button:hover { background: #1d4ed8; }
    .chat-input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Rental Search Agent</div>
    <div class="chat-messages" id="messages">
      <div class="message assistant">Hi! I can help you search for rental apartments and compare prices against fair market data. What are you looking for?</div>
    </div>
    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="chat-input-area">
      <textarea id="input" rows="1" placeholder="e.g. 2-bedroom apartments in Austin under $1800/mo" autofocus></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const API_URL = "/chat"; // Change this to your backend endpoint

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const typingEl = document.getElementById("typing");

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, "user");
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      typingEl.classList.add("visible");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        addMessage(data.response, "assistant");
      } catch (err) {
        addMessage(`Could not reach the backend (${err.message}). Make sure the server is running.`, "error");
      } finally {
        typingEl.classList.remove("visible");
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
