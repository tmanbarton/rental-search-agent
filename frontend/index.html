<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rental Search Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Rental Search Agent</div>
    <div class="chat-messages" id="messages">
      <div class="message assistant">Hi! I can help you search for rental apartments and compare prices against fair market data. What are you looking for?</div>
    </div>
    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>
    <div class="chat-input-area">
      <textarea id="input" rows="1" placeholder="e.g. 2-bedroom apartments in Austin under $1800/mo" autofocus></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
